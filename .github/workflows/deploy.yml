name: Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  DEPLOY_PATH: "/opt/sie-pap-digital"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove runtime-only paths before transfer
        run: rm -rf .git suitecrm/upload

      - name: Transfer files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "."
          target: ${{ env.DEPLOY_PATH }}
          overwrite: true

      - name: Execute deployment on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            echo "[ SYSTEM ] Locating deployment directory..."
            cd ${{ env.DEPLOY_PATH }}

            echo "[ AUTH ] Initializing GHCR connection..."
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "[ NETWORK ] Verifying proxy network..."
            docker network ls | grep -w proxy || docker network create proxy

            echo "[ STACK ] Rebuilding services..."
            docker compose -p sie-muhave pull && docker compose -p sie-muhave up -d --build --remove-orphans

            echo "[ DONE ] Deployment complete."
